<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- Satoshi font — formiq brand font -->
  <link rel="preconnect" href="https://api.fontshare.com" />

  <!-- SEO -->

  <meta name="description" content="formiq is a smart fitness platform that delivers real-time, AI-powered workout guidance. Coach David watches your form every rep and corrects you in real time." />

  <!-- Open Graph — WhatsApp / LinkedIn previews -->
  <meta property="og:title" content="formiq — Your Form, Perfected" />

  <meta name="twitter:title" content="formiq — Your Form, Perfected" />
  <meta name="twitter:description" content="Real-time AI coaching through your phone camera. Corrects your form every rep." />
  <meta name="twitter:image" content="https://formiq.app/og-image.png" />

  <!-- Theme colour — browser UI bar matches brand -->
  <meta name="theme-color" content="#000000" />
